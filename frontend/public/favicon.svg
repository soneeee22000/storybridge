<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Book-bridge: two pages meeting at center forming a bridge arc -->
  <!-- Left page -->
  <path d="M4 24 C4 24 8 8 16 8" stroke="#c67a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right page -->
  <path d="M28 24 C28 24 24 8 16 8" stroke="#c67a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bridge deck / spine -->
  <path d="M6 22 Q16 14 26 22" stroke="#4a3228" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Center dot where pages meet -->
  <circle cx="16" cy="8" r="2.5" fill="#c67a4a"/>
  <!-- Text lines on left page -->
  <line x1="8" y1="17" x2="13" y2="13" stroke="#3d6b4f" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="9" y1="20" x2="14" y2="15.5" stroke="#3d6b4f" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Text lines on right page -->
  <line x1="24" y1="17" x2="19" y2="13" stroke="#d4a843" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="23" y1="20" x2="18" y2="15.5" stroke="#d4a843" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
